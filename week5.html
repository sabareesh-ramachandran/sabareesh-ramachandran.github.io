<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 5 — Omitted Variable Bias</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #EEF2F7; min-height: 100vh; padding: 14px 20px 20px; color: #2E3B42;
  }
  h1 { font-size: 1.4rem; font-weight: 700; color: #182890; text-align: center; margin-bottom: 2px; }
  .subtitle { font-size: 0.78rem; color: #738F9C; text-align: center; margin-bottom: 12px; }

  .tab-bar { display: flex; justify-content: center; gap: 8px; max-width: 1180px; margin: 0 auto 12px; }
  .tab-btn {
    flex: 1; max-width: 320px; padding: 10px 16px; background: #fff; color: #536471;
    border: 1.5px solid #dce3ea; border-radius: 10px 10px 0 0; border-bottom: none;
    font-size: 0.90rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:hover { background: #f4f6f8; color: #182890; }
  .tab-btn.active { background: #182890; color: #fff; border-color: #182890; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 18px 24px; max-width: 1180px; margin: 0 auto;
  }
  .layout { display: grid; grid-template-columns: 248px 1fr; gap: 22px; align-items: start; }

  .clabel {
    display: block; font-size: 0.60rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #a0aab4; margin: 4px 0 7px;
  }
  .step-btn {
    width: 100%; margin-bottom: 6px; padding: 9px 11px; text-align: left;
    background: #fff; color: #536471; border: 1.5px solid #dce3ea; border-radius: 8px;
    font-size: 0.80rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .step-btn:hover { background: #f4f6f8; color: #182890; }
  .step-btn.active { background: #182890; color: #fff; border-color: #182890; }
  .step-btn.red.active { background: #c0392b; border-color: #c0392b; }
  .step-btn.amber.active { background: #c88a00; border-color: #c88a00; }
  .action-btn {
    width: 100%; margin-bottom: 6px; padding: 9px 11px; text-align: left;
    background: #fff; color: #536471; border: 1.5px dashed #c8d4de; border-radius: 8px;
    font-size: 0.80rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { background: #f4f6f8; color: #182890; }
  .chk { display: flex; align-items: center; gap: 7px; font-size: 0.76rem;
    color: #536471; margin: 2px 0 12px 2px; cursor: pointer; }
  .chk input { accent-color: #c0392b; cursor: pointer; }

  .slider-wrap { margin: 6px 0 14px; }
  .slider-wrap .row { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-wrap .v { font-size: 0.95rem; font-weight: 700; color: #182890; }
  input[type=range] { width: 100%; accent-color: #182890; cursor: pointer; margin-top: 6px; }

  .stats { border-top: 1px solid #eef0f2; padding-top: 10px; margin-top: 4px; }
  .srow { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .slbl { font-size: 0.70rem; color: #738F9C; }
  .sval { font-size: 0.88rem; font-weight: 700; color: #182890; }
  .sval.red { color: #c0392b; } .sval.gray { color: #738F9C; }
  .interp {
    margin-top: 10px; padding: 9px 11px; border-radius: 8px; font-size: 0.76rem;
    line-height: 1.35; background: #f8fafc; border: 1.5px solid #dce3ea; color: #2E3B42;
  }
  .interp.up { background: #fdecea; border-color: #e8b4ad; }
  .interp.down { background: #fff7e6; border-color: #e8c98a; }
  .interp.zcm { background: #eaf0fd; border-color: #b0c4ee; }

  .reset-btn {
    width: 100%; margin-top: 8px; padding: 8px 0; background: #fff; color: #536471;
    border: 1.5px solid #c8d4de; border-radius: 8px; font-size: 0.80rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { background: #f4f6f8; }

  svg { display: block; width: 100%; }
  .caption { font-size: 0.74rem; color: #738F9C; text-align: center;
    margin-top: 8px; line-height: 1.4; }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.70rem; color: #536471; }
</style>
</head>
<body>

<h1>Week 5 &mdash; Omitted Variable Bias</h1>
<p class="subtitle">Statistical Methods for Business Decision Making &middot; ISB</p>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="binary">Binary x</button>
  <button class="tab-btn" data-tab="continuous">Continuous x</button>
</div>

<div id="tab-binary" class="tab-pane active"><div class="card" id="panel-binary"></div></div>
<div id="tab-continuous" class="tab-pane"><div class="card" id="panel-continuous"></div></div>

<script>
// ── Seeded RNG (reproducible scatter every lecture) ──
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function randn(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
const mean = a => a.reduce((s,v)=>s+v,0)/a.length;
const sd   = (a,m) => Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/(a.length-1));
const fmt  = (n,d=3) => (n>=0?'':'−') + Math.abs(n).toFixed(d);

const CONTROLS = `
<div class="layout">
  <div>
    <span class="clabel">Demo steps</span>
    <button class="step-btn red" data-act="line">①  Show true causal line</button>
    <button class="step-btn red" data-act="err">②  Show errors uᵢ</button>
    <label class="chk"><input type="checkbox" data-chk="curved"> Curved arrows</label>
    <div class="slider-wrap">
      <div class="row"><span class="slbl">Corr(u, x) target&nbsp; ρ</span><span class="v" data-el="rhoVal">0.60</span></div>
      <input type="range" data-el="rho" min="-0.9" max="0.9" step="0.05" value="0.6">
    </div>
    <button class="step-btn" data-act="dots">③  Show data points (xᵢ, yᵢ)</button>
    <button class="action-btn" data-act="hideRed">④  Hide all red</button>
    <button class="step-btn amber" data-act="ols">⑤  Show OLS estimate</button>
    <button class="action-btn" data-act="revealLine">⑥  Reveal true line again</button>
    <div class="stats">
      <div class="srow"><span class="slbl">True slope &beta;&#8321;</span><span class="sval red" data-el="trueB1"></span></div>
      <div class="srow"><span class="slbl">OLS slope &beta;&#770;&#8321;</span><span class="sval" data-el="olsB1">&mdash;</span></div>
      <div class="srow"><span class="slbl">Bias &nbsp;&beta;&#770;&#8321; &minus; &beta;&#8321;</span><span class="sval gray" data-el="bias">&mdash;</span></div>
      <div class="srow"><span class="slbl">Realized corr(u, x)</span><span class="sval" data-el="realCorr">&mdash;</span></div>
    </div>
    <div class="interp" data-el="interp">Pick &rho;, then walk through the steps.</div>
    <button class="reset-btn" data-act="reset">&#8635;&nbsp; Reset</button>
  </div>
  <div>
    <svg data-el="svg" viewBox="0 0 680 470" height="470"></svg>
    <div class="caption">
      The <b style="color:#c0392b">red line</b> is never observed in real data &mdash;
      the <b style="color:#c88a00">amber dotted line</b> is all OLS gives you.
      The gap between them is <b>omitted&#8209;variable bias</b>.
    </div>
    <div class="legend">
      <div class="legend-item"><svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#c0392b" stroke-width="3"/></svg> True causal line</div>
      <div class="legend-item"><svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#c0392b" stroke-width="2"/></svg> Errors u&#7522;</div>
      <div class="legend-item"><svg width="16" height="12"><circle cx="8" cy="6" r="5" fill="#182890"/></svg> Data (x&#7522;, y&#7522;)</div>
      <div class="legend-item"><svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#FFC000" stroke-width="3" stroke-dasharray="2 5" stroke-linecap="round"/></svg> OLS estimate</div>
    </div>
  </div>
</div>`;

// ── Panel factory ──
function makePanel(rootId, cfg){
  const root = document.getElementById(rootId);
  root.innerHTML = CONTROLS;
  const el = n => root.querySelector(`[data-el="${n}"]`);
  const svg = el('svg');

  // geometry
  const L=58,R=28,T=22,Bm=46,VW=680,VH=470, PW=VW-L-R, PH=VH-T-Bm;
  const X = v => L + (v-cfg.XD[0])/(cfg.XD[1]-cfg.XD[0])*PW;
  const Y = v => T + (cfg.YD[1]-v)/(cfg.YD[1]-cfg.YD[0])*PH;

  // fixed data
  const rng = mulberry32(cfg.seed);
  let xs=[], jit=[];
  if(cfg.binary){
    for(let i=0;i<cfg.N;i++){ xs.push(i < cfg.N/2 ? 0 : 1); jit.push(0); }
  } else {
    for(let i=0;i<cfg.N;i++){ xs.push(0.5 + rng()*9.0); jit.push(0); }
    xs.sort((a,b)=>a-b);
  }
  const es = []; for(let i=0;i<cfg.N;i++) es.push(randn(rng));
  const ws = []; for(let i=0;i<cfg.N;i++) ws.push(randn(rng));
  const xbar = mean(xs), xsd = sd(xs,xbar);
  const zx = xs.map(v => (v-xbar)/xsd);
  // ez: spread orthogonal to x — carries the σ-scale scatter, no slope bias or noise
  let bb=0,dd=0; for(let i=0;i<cfg.N;i++){ bb+=zx[i]*es[i]; dd+=zx[i]*zx[i]; } bb/=dd;
  const ep = es.map((e,i)=> e - bb*zx[i]);
  const epbar = mean(ep), epsd = sd(ep,epbar);
  const ez = ep.map(v => (v-epbar)/epsd);
  // ezB: independent noise, NOT orthogonalised — gives finite-sample slope noise
  const wbar = mean(ws), wsd = sd(ws,wbar);
  const ezB = ws.map(v => (v-wbar)/wsd);

  function build(rho){
    const k = Math.sqrt(Math.max(0,1-rho*rho));
    const us = zx.map((z,i)=> cfg.SIGMA*(rho*z + k*ez[i]) + cfg.NOISE*ezB[i]);
    const ys = xs.map((x,i)=> cfg.B0 + cfg.B1*x + us[i]);
    const yb = mean(ys);
    let Sxy=0,Sxx=0;
    for(let i=0;i<cfg.N;i++){ Sxy+=(xs[i]-xbar)*(ys[i]-yb); Sxx+=(xs[i]-xbar)*(xs[i]-xbar); }
    const b1=Sxy/Sxx, b0=yb-b1*xbar;
    const ub=mean(us), usd=sd(us,ub);
    let c=0; for(let i=0;i<cfg.N;i++) c+=(xs[i]-xbar)*(us[i]-ub);
    return { us, ys, b0, b1, corr:c/((cfg.N-1)*xsd*usd) };
  }

  let S = { line:false, err:false, dots:false, ols:false, curved:true, rho:0.6 };

  function render(){
    const d = build(S.rho);
    let g = `<defs><marker id="ah-${rootId}" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/></marker></defs>`;

    for(const gx of cfg.xTicks) g += `<line x1="${X(gx)}" y1="${Y(cfg.YD[0])}" x2="${X(gx)}" y2="${Y(cfg.YD[1])}" stroke="#eef1f5"/>`;
    for(const gy of cfg.yTicks) g += `<line x1="${X(cfg.XD[0])}" y1="${Y(gy)}" x2="${X(cfg.XD[1])}" y2="${Y(gy)}" stroke="#eef1f5"/>`;
    const axisX = X(cfg.XD[0]);
    const baseY = Y(Math.max(cfg.YD[0], Math.min(cfg.YD[1], 0)));
    g += `<line x1="${axisX}" y1="${Y(cfg.YD[0])}" x2="${axisX}" y2="${Y(cfg.YD[1])}" stroke="#b8c2cc" stroke-width="1.5"/>`;
    g += `<line x1="${X(cfg.XD[0])}" y1="${baseY}" x2="${X(cfg.XD[1])}" y2="${baseY}" stroke="#b8c2cc" stroke-width="1.5"/>`;
    for(const gx of cfg.xTicks) g += `<text x="${X(gx)}" y="${Y(cfg.YD[0])+18}" font-size="11" fill="#738F9C" text-anchor="middle">${gx}</text>`;
    for(const gy of cfg.yTicks) g += `<text x="${axisX-9}" y="${Y(gy)+4}" font-size="11" fill="#738F9C" text-anchor="end">${gy}</text>`;
    g += `<text x="${X(cfg.XD[1])-4}" y="${baseY+18}" font-size="12" fill="#536471" font-style="italic">x</text>`;
    g += `<text x="${axisX-30}" y="${Y(cfg.yTicks[cfg.yTicks.length-1])}" font-size="12" fill="#536471" font-style="italic">y</text>`;

    if(S.err){
      for(let i=0;i<cfg.N;i++){
        const px = X(xs[i]+jit[i]);
        const y1 = Y(cfg.B0+cfg.B1*xs[i]);
        const y2t = Y(d.ys[i]);
        const dir = y2t>y1?1:-1, y2 = y2t - dir*6;
        if(Math.abs(y2-y1) < 2) continue;
        if(S.curved){
          const off = (i%2?1:-1)*Math.min(28, 8+0.15*Math.abs(y2-y1));
          g += `<path d="M${px},${y1} Q${px+off},${(y1+y2)/2} ${px},${y2}" fill="none" stroke="#c0392b" stroke-width="1.6" opacity="0.85" marker-end="url(#ah-${rootId})"/>`;
        } else {
          g += `<line x1="${px}" y1="${y1}" x2="${px}" y2="${y2}" stroke="#c0392b" stroke-width="1.6" opacity="0.85" marker-end="url(#ah-${rootId})"/>`;
        }
      }
    }

    if(S.line){
      g += `<line x1="${X(cfg.XD[0])}" y1="${Y(cfg.B0+cfg.B1*cfg.XD[0])}" x2="${X(cfg.XD[1])}" y2="${Y(cfg.B0+cfg.B1*cfg.XD[1])}" stroke="#c0392b" stroke-width="3"/>`;
      const tx = cfg.XD[0]+0.84*(cfg.XD[1]-cfg.XD[0]);
      g += `<text x="${X(tx)}" y="${Y(cfg.B0+cfg.B1*tx)-12}" font-size="14" fill="#c0392b" font-weight="700" text-anchor="middle">y = β₀ + β₁x</text>`;
    }

    if(S.dots){
      for(let i=0;i<cfg.N;i++) g += `<circle cx="${X(xs[i]+jit[i])}" cy="${Y(d.ys[i])}" r="5" fill="#182890" opacity="0.88"/>`;
    }

    if(S.ols){
      g += `<line x1="${X(cfg.XD[0])}" y1="${Y(d.b0+d.b1*cfg.XD[0])}" x2="${X(cfg.XD[1])}" y2="${Y(d.b0+d.b1*cfg.XD[1])}" stroke="#FFC000" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/>`;
      const ox = cfg.XD[0]+0.24*(cfg.XD[1]-cfg.XD[0]);
      g += `<text x="${X(ox)}" y="${Y(d.b0+d.b1*ox)+24}" font-size="14" fill="#c88a00" font-weight="700" text-anchor="middle">ŷ = β̂₀ + β̂₁x</text>`;
    }

    const sx = axisX + 14;
    if(S.line) g += `<text x="${sx}" y="${T+20}" font-size="13" fill="#c0392b" font-weight="700">β₁ (true) = ${fmt(cfg.B1,3)}</text>`;
    if(S.ols)  g += `<text x="${sx}" y="${T+38}" font-size="13" fill="#c88a00" font-weight="700">β̂₁ (OLS) = ${fmt(d.b1,3)}</text>`;

    svg.innerHTML = g;

    el('trueB1').textContent = cfg.B1.toFixed(3);
    el('olsB1').textContent  = fmt(d.b1);
    const bias = d.b1 - cfg.B1, bEl = el('bias');
    bEl.textContent = (bias>=0?'+':'−') + Math.abs(bias).toFixed(3);
    bEl.className = 'sval';
    bEl.style.color = Math.abs(S.rho)<0.05 ? '#738F9C' : (S.rho>0 ? '#c0392b' : '#c88a00');
    el('realCorr').textContent = fmt(d.corr,2);

    const ip = el('interp');
    if(Math.abs(S.rho) < 0.05){
      ip.className = 'interp zcm';
      ip.innerHTML = '<b>&rho; &asymp; 0 &rarr; ZCM holds.</b> u is balanced across x, so OLS &beta;&#770;&#8321; &asymp; the true &beta;&#8321; up to sampling noise. No <i>systematic</i> omitted&#8209;variable bias.';
    } else if(S.rho > 0){
      ip.className = 'interp up';
      ip.innerHTML = '<b>Corr(u, x) &gt; 0 &rarr; upward bias.</b> Points with larger x carry larger u, so OLS over&#8209;estimates the slope: &beta;&#770;&#8321; &gt; &beta;&#8321;.';
    } else {
      ip.className = 'interp down';
      ip.innerHTML = '<b>Corr(u, x) &lt; 0 &rarr; downward bias.</b> Points with larger x carry smaller u, so OLS under&#8209;estimates the slope: &beta;&#770;&#8321; &lt; &beta;&#8321;.';
    }

    const set = (act,on,a,b)=>{ const btn=root.querySelector(`[data-act="${act}"]`);
      btn.classList.toggle('active',on); btn.innerHTML = on?b:a; };
    set('line', S.line, '①  Show true causal line', '①  Hide true line');
    set('err',  S.err,  '②  Show errors uᵢ',     '②  Hide errors uᵢ');
    set('dots', S.dots, '③  Show data points (xᵢ, yᵢ)', '③  Hide data points');
    set('ols',  S.ols,  '⑤  Show OLS estimate',      '⑤  Hide OLS estimate');
  }

  // wire events
  root.querySelector('[data-act="line"]').onclick = ()=>{ S.line=!S.line; render(); };
  root.querySelector('[data-act="err"]').onclick  = ()=>{ S.err=!S.err; render(); };
  root.querySelector('[data-act="dots"]').onclick = ()=>{ S.dots=!S.dots; render(); };
  root.querySelector('[data-act="ols"]').onclick  = ()=>{ S.ols=!S.ols; render(); };
  root.querySelector('[data-act="hideRed"]').onclick    = ()=>{ S.line=false; S.err=false; render(); };
  root.querySelector('[data-act="revealLine"]').onclick = ()=>{ S.line=true; render(); };
  root.querySelector('[data-act="reset"]').onclick = ()=>{
    S = { line:false, err:false, dots:false, ols:false, curved:true, rho:0.6 };
    el('rho').value=0.6; el('rhoVal').textContent='0.60';
    root.querySelector('[data-chk="curved"]').checked=true; render();
  };
  root.querySelector('[data-chk="curved"]').onchange = e => { S.curved=e.target.checked; render(); };
  el('rho').oninput = e => { S.rho=parseFloat(e.target.value);
    el('rhoVal').textContent=(S.rho>=0?'':'−')+Math.abs(S.rho).toFixed(2); render(); };

  root.querySelector('[data-chk="curved"]').checked = true;
  render();
}

// ── Tabs ──
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  };
});

makePanel('panel-binary', {
  binary:true, seed:20260516, N:30, B0:395, B1:43, SIGMA:75, NOISE:6.0197,
  XD:[-0.35,1.35], YD:[150,650], xTicks:[0,1], yTicks:[200,300,400,500,600]
});
makePanel('panel-continuous', {
  binary:false, seed:20260517, N:28, B0:2, B1:1.05, SIGMA:3.0, NOISE:0.6021,
  XD:[0,10], YD:[-6,21], xTicks:[0,2,4,6,8,10], yTicks:[-5,0,5,10,15,20]
});
</script>

</body>
</html>
